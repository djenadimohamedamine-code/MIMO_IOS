name: MIMO_NDI_BUILD
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create_Project
        run: flutter create --project-name=mimo_ndi --platforms=ios .

      - name: Fetch_NDI
        run: |
          brew install p7zip
          mkdir -p ios/NDISDK/lib/
          mkdir -p ios/NDISDK/include/
          cd ios
          curl -L "https://github.com/djenadimohamedamine-code/MIMO_IOS/releases/download/v1.0.1-stable/libndi_ios.zip" -o "libndi_ios.zip"
          curl -L "https://github.com/djenadimohamedamine-code/MIMO_IOS/releases/download/v1.0.1-stable/include.7z" -o "include.7z"
          unzip -o libndi_ios.zip -d temp_lib
          find temp_lib -name "*.a" -exec cp {} NDISDK/lib/libndi_ios.a \;
          7z x include.7z -oNDISDK/include/ -y

      - name: Deps
        run: |
          flutter config --enable-ios
          flutter pub get

      - name: Xcode_Config
        run: |
          sudo gem install xcodeproj
          cd ios
          ruby configure_xcode.rb

      - name: Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build
        run: |
          flutter build ios --release --no-codesign --verbose
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_NDI.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mimo-ndi-ipa
          path: build/ios/iphoneos/MIMO_NDI.ipa
