name: mimo_ndi
description: Broadcast-quality NDI player and controller - SUNLIGHT EDITION.
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  permission_handler: ^11.0.1
  webview_flutter: ^4.4.2
  speech_to_text: ^6.6.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.3.11"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "IMG_0730.JPG"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: "IMG_0730.JPG"
  fullscreen: true
  ios: true
  android: true

flutter:
  uses-material-design: true
  assets:
    - IMG_0730.JPG
